# fly.toml app configuration file generated for nohanml-backend
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nohanml-backend'
primary_region = 'cdg'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/api/v1/health"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
